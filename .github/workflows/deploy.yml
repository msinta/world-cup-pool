name: Deploy to Netlify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual re-deploy from GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_ADMIN_PIN: ${{ secrets.VITE_ADMIN_PIN }}

      - name: Deploy to Netlify (preview)
        if: github.event_name == 'pull_request'
        run: npx netlify-cli deploy --dir=dist --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --site=${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy to Netlify (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx netlify-cli deploy --dir=dist --prod --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --site=${{ secrets.NETLIFY_SITE_ID }}
