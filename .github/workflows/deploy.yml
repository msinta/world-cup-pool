name: Deploy to Netlify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allow manual re-deploy from GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://upzuvpogdracavcmxakp.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwenV2cG9nZHJhY2F2Y214YWtwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODkzNzMsImV4cCI6MjA5NDc2NTM3M30._akzEANRa-ohHspeIzOF8lkn_--3eRLBL_YzpDLswFc
          VITE_ADMIN_PIN: ${{ secrets.VITE_ADMIN_PIN }}
          VITE_FOOTBALL_API_KEY: ${{ secrets.VITE_FOOTBALL_API_KEY }}

      - name: Deploy to Netlify (preview)
        if: github.event_name == 'pull_request'
        run: npx netlify-cli deploy --dir=dist --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --site=bcc74e86-b64a-46f7-961c-313573ba3799

      - name: Deploy to Netlify (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx netlify-cli deploy --dir=dist --prod --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --site=bcc74e86-b64a-46f7-961c-313573ba3799
